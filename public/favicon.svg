<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <g transform="translate(16,16) scale(0.8)" fill="none">
    <!-- Left sword -->
    <g transform="rotate(-35)">
      <line x1="0" y1="-13" x2="0" y2="6" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-3" y1="5" x2="3" y2="5" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <!-- Right sword -->
    <g transform="rotate(35)">
      <line x1="0" y1="-13" x2="0" y2="6" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-3" y1="5" x2="3" y2="5" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <!-- Anchor ring -->
    <circle cx="0" cy="-7" r="2.5" stroke="#fff" stroke-width="1.5" fill="none"/>
    <!-- Anchor shank -->
    <line x1="0" y1="-4.5" x2="0" y2="8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Anchor stock -->
    <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Left fluke -->
    <path d="M0 8 Q-2 10 -5 11" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-5 11 L-7 10" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Right fluke -->
    <path d="M0 8 Q2 10 5 11" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M5 11 L7 10" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>