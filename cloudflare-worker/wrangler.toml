name = "threeseas-template-storage"
main = "worker.js"
compatibility_date = "2024-01-01"
account_id = "1fe92d3ea6985f7766d3c483af6c66dd" # ← Replace with your Cloudflare Account ID (run `wrangler whoami`)
workers_dev = true

# R2 bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "template-storage"

# Set these in the Cloudflare dashboard under Worker > Settings > Variables
# [vars]
# ALLOWED_ORIGIN = "https://yourdomain.com"
#
# Secrets (set via `wrangler secret put R2_API_KEY`):
# R2_API_KEY = "your-secret-api-key"
